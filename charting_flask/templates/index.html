<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Live Index Chart</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f7;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }
        .toolbar {
            display: flex;
            gap: 12px;
            align-items: center;
            padding: 10px 14px;
            margin-bottom: 12px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            font-size: 14px;
        }
        .toolbar label { font-weight: 600; }
        .toolbar select, .toolbar input {
            font-size: 14px;
            padding: 4px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .toolbar .status {
            color: #666;
            font-style: italic;
            margin-left: 8px;
        }
        .chart-wrapper { text-align: center; }
        #chart-img {
            border: 1px solid #ddd;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 95vw;
            height: auto;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <label for="ticker">Ticker:</label>
    <select id="ticker"><option value="">(auto)</option></select>

    <label for="candle">Candle (ticks):</label>
    <input id="candle" type="number" min="1" step="1" value="10" style="width: 70px;" />

    <label for="refresh">Refresh (ms):</label>
    <input id="refresh" type="number" min="200" step="100" value="500" style="width: 80px;" />

    <span class="status" id="status"></span>
</div>

<div class="chart-wrapper">
    <img id="chart-img" src="/chart.png" alt="Live chart" />
</div>

<script>
(function () {
    const tickerSelect = document.getElementById("ticker");
    const candleInput  = document.getElementById("candle");
    const refreshInput = document.getElementById("refresh");
    const statusEl     = document.getElementById("status");
    const img          = document.getElementById("chart-img");

    let refreshTimer = null;

    function buildSrc() {
        const params = new URLSearchParams();
        if (tickerSelect.value)              params.set("ticker", tickerSelect.value);
        if (candleInput.value)               params.set("candle", candleInput.value);
        params.set("ts", Date.now());
        return "/chart.png?" + params.toString();
    }

    function refreshImage() {
        img.src = buildSrc();
    }

    function scheduleRefresh() {
        if (refreshTimer) clearInterval(refreshTimer);
        const ms = Math.max(200, parseInt(refreshInput.value, 10) || 500);
        refreshTimer = setInterval(refreshImage, ms);
    }

    async function loadTickers() {
        try {
            const r = await fetch("/tickers");
            const j = await r.json();
            const list = (j && j.tickers) || [];
            // Preserve "(auto)" as default
            tickerSelect.innerHTML = '<option value="">(auto)</option>';
            for (const t of list) {
                const opt = document.createElement("option");
                opt.value = t;
                opt.textContent = t;
                tickerSelect.appendChild(opt);
            }
            statusEl.textContent = list.length
                ? `${list.length} tickers loaded`
                : "no tickers from /tickers";
        } catch (e) {
            statusEl.textContent = "ticker load failed: " + e;
        }
    }

    tickerSelect.addEventListener("change", refreshImage);
    candleInput.addEventListener("change", refreshImage);
    refreshInput.addEventListener("change", scheduleRefresh);

    loadTickers();
    refreshImage();
    scheduleRefresh();
})();
</script>
</body>
</html>
